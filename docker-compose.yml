services:
  server:
    build: ./server
    container_name: resume-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_BASE_URL: http://server:5000
    container_name: resume-client
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped